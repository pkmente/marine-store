services:
  - type: web
    name: marine-store
    runtime: python
    buildCommand: |
      apt-get update
      apt-get install -y libjpeg-dev zlib1g-dev libtiff-dev libfreetype6-dev
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    startCommand: gunicorn marine_store.wsgi:application
